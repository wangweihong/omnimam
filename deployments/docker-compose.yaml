# Quick local deployment for OmniMAM Frontend, API Server, and Task Worker.
#
# Build local images first, for example:
#   make configs
#   make image VERSION=latest REGISTRY_PREFIX=omnimam
#   make frontend.image FRONTEND_VERSION=latest FRONTEND_REGISTRY_PREFIX=omnimam
#   docker compose -f deployments/docker-compose.yaml up -d
#
# The Makefile image rule tags host-arch images as <version>-<arch>.
# Override OMNIMAM_IMAGE_TAG when needed, for example latest-arm64.

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnimam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OMNIMAM_POSTGRES_DB:-omnimam}
      POSTGRES_USER: ${OMNIMAM_POSTGRES_USER:-omnimam}
      POSTGRES_PASSWORD: ${OMNIMAM_POSTGRES_PASSWORD:-omnimam}
    ports:
      - "${OMNIMAM_POSTGRES_PORT:-5432}:5432"
    volumes:
      - omnimam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  apiserver:
    image: ${OMNIMAM_REGISTRY_PREFIX:-omnimam}/apiserver:${OMNIMAM_IMAGE_TAG:-latest-amd64}
    container_name: omnimam-apiserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      omnimam_LOG_DIR: /var/log/omnimam
      APISERVER_RUNTIME_DEBUG_OUTPUT_DIR: /var/lib/omnimam/debug/apiserver
      APISERVER_INSECURE_BIND_ADDRESS: 0.0.0.0
      APISERVER_INSECURE_BIND_PORT: 8080
      APISERVER_SECURE_BIND_ADDRESS: 0.0.0.0
      APISERVER_SECURE_BIND_PORT: 8443
      APISERVER_DATABASE_TYPE: postgresql
      APISERVER_DATABASE_NAME: ${OMNIMAM_POSTGRES_DB:-omnimam}
      APISERVER_POSTGRES_HOST: postgres
      APISERVER_POSTGRES_PORT: 5432
      APISERVER_POSTGRES_USER: ${OMNIMAM_POSTGRES_USER:-omnimam}
      APISERVER_POSTGRES_PASSWORD: ${OMNIMAM_POSTGRES_PASSWORD:-omnimam}
      APISERVER_MYSQL_HOST: mysql
      APISERVER_MYSQL_USER: omnimam
      APISERVER_MYSQL_PASSWORD: omnimam
      APISERVER_SECURE_TLS_CERT_FILE: /etc/omnimam/cert/apiserver.crt
      APISERVER_SECURE_TLS_CERT_KEY: /etc/omnimam/cert/apiserver.key
      OMNIMAM_STORAGE_ROOT: /var/lib/omnimam/assets
    ports:
      - "${OMNIMAM_APISERVER_PORT:-8080}:8080"
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        render_config() {
          template="$$1"
          output="$$2"
          cp "$$template" "$$output"
          for name in \
            omnimam_LOG_DIR \
            APISERVER_RUNTIME_DEBUG_OUTPUT_DIR \
            APISERVER_INSECURE_BIND_ADDRESS \
            APISERVER_INSECURE_BIND_PORT \
            APISERVER_SECURE_BIND_ADDRESS \
            APISERVER_SECURE_BIND_PORT \
            APISERVER_SECURE_TLS_CERT_FILE \
            APISERVER_SECURE_TLS_CERT_KEY \
            APISERVER_DATABASE_TYPE \
            APISERVER_DATABASE_NAME \
            APISERVER_POSTGRES_HOST \
            APISERVER_POSTGRES_PORT \
            APISERVER_POSTGRES_USER \
            APISERVER_POSTGRES_PASSWORD \
            APISERVER_MYSQL_HOST \
            APISERVER_MYSQL_USER \
            APISERVER_MYSQL_PASSWORD; do
            value="$$(printenv "$$name" || true)"
            escaped="$$(printf '%s' "$$value" | sed 's/[\/&]/\\&/g')"
            sed -i "s/\$${$$name}/$$escaped/g" "$$output"
          done
        }
        render_config /etc/omnimam-template/apiserver.yaml /tmp/apiserver.yaml
        exec /opt/omnimam/bin/apiserver -c /tmp/apiserver.yaml
    volumes:
      - ../configs/apiserver.yaml:/etc/omnimam-template/apiserver.yaml:ro
      - omnimam_logs:/var/log/omnimam
      - omnimam_debug:/var/lib/omnimam/debug
      - omnimam_assets:/var/lib/omnimam/assets

  taskworker:
    image: ${OMNIMAM_REGISTRY_PREFIX:-omnimam}/taskworker:${OMNIMAM_IMAGE_TAG:-latest-amd64}
    container_name: omnimam-taskworker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      apiserver:
        condition: service_started
    environment:
      omnimam_LOG_DIR: /var/log/omnimam
      TASKWORKER_RUNTIME_DEBUG_OUTPUT_DIR: /var/lib/omnimam/debug/taskworker
      TASKWORKER_INSECURE_BIND_ADDRESS: 127.0.0.1
      TASKWORKER_INSECURE_BIND_PORT: 18080
      TASKWORKER_SECURE_BIND_ADDRESS: 127.0.0.1
      TASKWORKER_SECURE_BIND_PORT: 18443
      TASKWORKER_SECURE_TLS_CERT_FILE: /etc/omnimam/cert/taskworker.crt
      TASKWORKER_SECURE_TLS_CERT_KEY: /etc/omnimam/cert/taskworker.key
      APISERVER_DATABASE_TYPE: postgresql
      APISERVER_DATABASE_NAME: ${OMNIMAM_POSTGRES_DB:-omnimam}
      APISERVER_POSTGRES_HOST: postgres
      APISERVER_POSTGRES_PORT: 5432
      APISERVER_POSTGRES_USER: ${OMNIMAM_POSTGRES_USER:-omnimam}
      APISERVER_POSTGRES_PASSWORD: ${OMNIMAM_POSTGRES_PASSWORD:-omnimam}
      APISERVER_MYSQL_HOST: mysql
      APISERVER_MYSQL_USER: omnimam
      APISERVER_MYSQL_PASSWORD: omnimam
      OMNIMAM_STORAGE_ROOT: /var/lib/omnimam/assets
      OMNIMAM_WORKER_QUEUE: ${OMNIMAM_WORKER_QUEUE:-default}
      OMNIMAM_WORKER_POLL_INTERVAL: ${OMNIMAM_WORKER_POLL_INTERVAL:-3s}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        render_config() {
          template="$$1"
          output="$$2"
          cp "$$template" "$$output"
          for name in \
            omnimam_LOG_DIR \
            APISERVER_DATABASE_TYPE \
            APISERVER_DATABASE_NAME \
            APISERVER_POSTGRES_HOST \
            APISERVER_POSTGRES_PORT \
            APISERVER_POSTGRES_USER \
            APISERVER_POSTGRES_PASSWORD \
            APISERVER_MYSQL_HOST \
            APISERVER_MYSQL_USER \
            APISERVER_MYSQL_PASSWORD \
            TASKWORKER_RUNTIME_DEBUG_OUTPUT_DIR \
            TASKWORKER_INSECURE_BIND_ADDRESS \
            TASKWORKER_INSECURE_BIND_PORT \
            TASKWORKER_SECURE_BIND_ADDRESS \
            TASKWORKER_SECURE_BIND_PORT \
            TASKWORKER_SECURE_TLS_CERT_FILE \
            TASKWORKER_SECURE_TLS_CERT_KEY; do
            value="$$(printenv "$$name" || true)"
            escaped="$$(printf '%s' "$$value" | sed 's/[\/&]/\\&/g')"
            sed -i "s/\$${$$name}/$$escaped/g" "$$output"
          done
        }
        render_config /etc/omnimam-template/taskworker.yaml /tmp/taskworker.yaml
        exec /opt/omnimam/bin/taskworker -c /tmp/taskworker.yaml
    volumes:
      - ../configs/taskworker.yaml:/etc/omnimam-template/taskworker.yaml:ro
      - omnimam_logs:/var/log/omnimam
      - omnimam_debug:/var/lib/omnimam/debug
      - omnimam_assets:/var/lib/omnimam/assets

  frontend:
    image: ${OMNIMAM_REGISTRY_PREFIX:-omnimam}/frontend:${OMNIMAM_FRONTEND_IMAGE_TAG:-latest}
    container_name: omnimam-frontend
    restart: unless-stopped
    depends_on:
      apiserver:
        condition: service_started
    ports:
      - "${OMNIMAM_FRONTEND_PORT:-9990}:80"

volumes:
  omnimam_postgres_data:
  omnimam_logs:
  omnimam_debug:
  omnimam_assets:
